<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ropa de Comics</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="color.css">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-light bg-light">
  <div class="container-fluid">
    <a class="navbar-brand fw-bold" href="#" style="color: #00a8e8;">Ropa de Comics Chile</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav me-auto">
        <li class="nav-item"><a class="nav-link active" href="#">Inicio</a></li>
        <li class="nav-item"><a class="nav-link" href="#">Poleras</a></li>
        <li class="nav-item"><a class="nav-link" href="#">Chaquetas</a></li>
        <li class="nav-item"><a class="nav-link" href="#">Pantalones</a></li>
      </ul>
      <form class="d-flex">
        <input class="form-control me-2" type="search" placeholder="Buscar ropa...">
        <button class="btn btn-outline-info" type="submit">Buscar</button>
      </form>
    </div>
  </div>
</nav>

<header id="titulo_principal">
    <h1>Ropa de Comics</h1>
</header>

<h2 id="descripcionp">Bienvenido a la tienda de ropa de comics chile</h2>

<section class="container">
    <h1 class="titulo-seccion">PRODUCTOS</h1>

    <div class="contenedor-opciones">
        <span class="activa">Destacados</span>
        <span>Mas recientes</span>
        <span>Ofertas</span>
    </div>

    <div class="cuadricula-productos">
        <div class="tarjeta-producto">
            <div class="contenedor-imagen">
                <img src="img/dc17.webp" alt="Polera Batman">
                <span class="etiqueta-descuento">-13%</span>
                <div class="grupo-botones">
                    <span><i class="fa-regular fa-eye"></i></span>
                    <span><i class="fa-regular fa-heart"></i></span>
                    <span><i class="fa-solid fa-code-compare"></i></span>
                </div>
            </div>
            <div class="contenido-producto">
                <div class="estrellas">
                    <i class="fa-solid fa-star"></i><i class="fa-solid fa-star"></i><i class="fa-solid fa-star"></i><i class="fa-solid fa-star"></i><i class="fa-regular fa-star"></i>
                </div>
                <h3>Polera Batman</h3>
                <span class="agregar-carrito"><i class="fa-solid fa-basket-shopping"></i></span>
                <p class="precio">$14.990 <span>$18.990</span></p>
            </div>
        </div>

        <div class="tarjeta-producto">
            <div class="contenedor-imagen">
                <img src="img/invenc.webp" alt="Polera Invencible">
                <span class="etiqueta-descuento">-22%</span>
                <div class="grupo-botones">
                    <span><i class="fa-regular fa-eye"></i></span>
                    <span><i class="fa-regular fa-heart"></i></span>
                    <span><i class="fa-solid fa-code-compare"></i></span>
                </div>
            </div>
            <div class="contenido-producto">
                <div class="estrellas">
                    <i class="fa-solid fa-star"></i><i class="fa-solid fa-star"></i><i class="fa-solid fa-star"></i><i class="fa-solid fa-star"></i><i class="fa-solid fa-star"></i>
                </div>
                <h3>Polera Invencible</h3>
                <span class="agregar-carrito"><i class="fa-solid fa-basket-shopping"></i></span>
                <p class="precio">$12.990 <span>$16.500</span></p>
            </div>
        </div>

        <div class="tarjeta-producto">
            <div class="contenedor-imagen">
                <img src="img/xmen.webp" alt="Polera X-Men">
                <div class="grupo-botones">
                    <span><i class="fa-regular fa-eye"></i></span>
                    <span><i class="fa-regular fa-heart"></i></span>
                    <span><i class="fa-solid fa-code-compare"></i></span>
                </div>
            </div>
            <div class="contenido-producto">
                <div class="estrellas">
                    <i class="fa-solid fa-star"></i><i class="fa-solid fa-star"></i><i class="fa-solid fa-star"></i><i class="fa-solid fa-star"></i><i class="fa-regular fa-star"></i>
                </div>
                <h3>Polera X-Men</h3>
                <span class="agregar-carrito"><i class="fa-solid fa-basket-shopping"></i></span>
                <p class="precio">$15.990</p>
            </div>
        </div>
    </div>
</section>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
